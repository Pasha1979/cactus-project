name: my_cactus
description: Каталогизатор коллекции кактусов
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  cached_network_image: ^3.2.0
  collection: ^1.19.1
  csv: ^6.0.0
  excel: ^4.0.6
  file_picker: ^10.1.9
  flutter:
    sdk: flutter
  flutter_lints: ^6.0.0
  html: ^0.15.5+1
  http: ^1.3.0
  path_provider: ^2.1.4
  provider: ^6.1.1
  shared_preferences: ^2.5.2
  syncfusion_flutter_charts: ^29.2.9
  syncfusion_flutter_treemap: ^29.2.9  # Обновляем до версии, совместимой с charts
  url_launcher: ^6.2.0
  uuid: ^4.5.1
  table_calendar: ^3.0.9
  intl: ^0.20.2
  oauth2: ^2.0.2  # Для OAuth-авторизации
  path: ^1.8.3  # Для работы с путями
  dio: ^5.7.0  # Для HTTP-запросов к API Яндекс.Диска
  flutter_secure_storage: ^9.2.2  # Для безопасного хранения токенов
  go_router: ^14.8.0  # Декларативная навигация + deep linking
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.8
  image: ^4.1.3
    # Новое: Добавляем для планировщика уведомлений (tz.TZDateTime в scheduleDailyWeatherCheck, Вариант 3). Меняет: Разрешает импорт 'package:timezone/timezone.dart' as tz в plant_provider.dart — убирает предупреждение "depend_on_referenced_packages" (строка 20). Не удаляет: Твои зависимости (dio, flutter_secure_storage, image и т.д.) — все работают как раньше. Функциональность: Позволяет ежедневные уведомления на локальное время (e.g., 8:00 MSK без сдвига UTC), кросс-платформенный (Windows OK). Проверено: Версия ^0.9.2 совместима с Flutter 3.0+, no conflictos с provider или shared_preferences; YAML-синтаксис OK (indent 2 пробела).
  timezone: ^0.9.2
  # Новое: Добавляем для геолокации — получает координаты автоматически, не удаляет ручной ввод (fallback).
  geolocator: ^11.0.1  # Актуальная версия на 2025, совместима с Flutter 3+.
  # Новое: Добавляем для уведомлений — отправляет push о погоде/поливе, не конфликтует с существующими функциями (календарь остается).
  flutter_local_notifications: ^17.2.2  # Кросс-платформенные локальные уведомления.
  # Новое: Добавляем для интерактивной карты GBIF — отображает точки наблюдения на карте.
  flutter_map: ^6.1.0  # Интерактивная карта с OpenStreetMap
  latlong2: ^0.9.1  # Для работы с географическими координатами (совместимо с flutter_map 6.x)
  # Задача 1.1: QR-этикетки
  qr_flutter: ^4.1.0  # Генерация QR кодов
  pdf: ^3.10.8  # Генерация PDF
  # TODO(окружение): printing: ^5.13.4  # Печать PDF - временно отключено из-за ошибки сборки pdfium
  # Проблема: Build step for pdfium failed даже с установленной VS2022
  # Решение: Вернуть после исправления проблем с pdfium или использования альтернативного пакета
  # Рефакторинг: Добавляем для новой архитектуры
  get_it: ^7.6.0  # Dependency Injection
  injectable: ^2.3.2  # Dependency Injection с кодогенерацией
  hive: ^2.2.3  # Локальная база данных
  hive_flutter: ^1.1.0  # Hive для Flutter
  logger: ^2.0.0+1  # Структурированное логирование
  flutter_image_compress: ^2.4.0
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Рефакторинг: Добавляем для кодогенерации
  injectable_generator: ^2.4.1  # Генерация для injectable
  build_runner: ^2.4.8  # Кодогенерация
  hive_generator: ^2.0.1  # Генерация для Hive

flutter:
  uses-material-design: true
  assets:
    - assets/placeholder1.jpg
    - assets/placeholder2.jpg
    - assets/country_mapping.json
    - assets/icons/Icon 1.png

msix:
  display_name: My Cactus
  publisher_display_name: Pavel Cactus App
  identity_name: com.pavel.mycactus
  msix_version: 1.0.0.0
  logo_path: assets/icons/Icon 1.png
  capabilities: internetClient, privateNetworkClientServer
  install_mode: perMachine
  store: false

  # Самоподписанный сертификат + отключение строгой проверки
  sign_msix: true
  certificate_subject: "CN=Pavel Cactus App"
  certificate_password: "mycactus123"
  require_windows10_sdk: true
  windows_build_version: "10.0.19041.0"   # ← это важно

# Старый build-блок оставляем (он не мешает)
build:
  target: lib/main.dart
  flavors:
    development:
      dart-define:
        APP_ENV: development
    production:
      dart-define:
        APP_ENV: production
# === Создание нормального EXE-установщика (без предупреждений) ===
windows:
  executable: MyCactus
  icon: assets/icons/Icon 1.png
  version: 1.0.0.0
  publisher: Pavel Cactus App        